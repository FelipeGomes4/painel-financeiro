<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f2027"/>
      <stop offset="100%" style="stop-color:#1a3a4a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00c896"/>
      <stop offset="100%" style="stop-color:#009e76"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <!-- Decorative circle glow -->
  <circle cx="380" cy="130" r="120" fill="rgba(0,200,150,0.06)"/>
  <!-- Columns / pillars (bank/finance icon) -->
  <rect x="100" y="290" width="52" height="120" rx="8" fill="url(#accent)"/>
  <rect x="175" y="230" width="52" height="180" rx="8" fill="url(#accent)" opacity="0.85"/>
  <rect x="250" y="260" width="52" height="150" rx="8" fill="url(#accent)" opacity="0.7"/>
  <rect x="325" y="200" width="52" height="210" rx="8" fill="url(#accent)" opacity="0.9"/>
  <!-- Base line -->
  <rect x="80" y="422" width="320" height="10" rx="5" fill="url(#accent)"/>
  <!-- Trend line -->
  <polyline points="100,290 175,230 250,260 325,200 390,150"
    stroke="#00c896" stroke-width="10" fill="none"
    stroke-linecap="round" stroke-linejoin="round" opacity="0.5"/>
  <!-- Top triangle accent -->
  <polygon points="256,72 300,130 212,130" fill="url(#accent)" opacity="0.9"/>
</svg>
